<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SKIN AI – Upload Image</title>
<link rel="stylesheet" href="style.css" />
<style>
/* Import the entire dark neon aesthetic theme */
/* Keeping only the needed structures while simplifying for the upload page */

body {
  background: radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f0f 100%);
  font-family: 'Segoe UI', sans-serif;
  color: white;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
}

.upload-container {
  width: 450px;
  padding: 30px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  box-shadow: 0 0 10px rgba(0, 180, 255, 0.3);
  text-align: center;
  transition: 0.4s ease;
}

.upload-container:hover {
  box-shadow: 0 0 30px rgba(0, 180, 255, 0.9), 0 0 60px rgba(0, 255, 200, 0.8);
  transform: scale(1.03);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.upload-container h1 {
  font-size: 32px;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.upload-container h2 {
  font-size: 18px;
  margin-bottom: 20px;
  color: rgba(255,255,255,0.8);
}

.disease-list {
  list-style: none;
  padding: 0;
  margin: 20px 0;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.disease-list li {
  padding: 10px 18px;
  border-radius: 25px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(5px);
  font-size: 14px;
  transition: 0.3s ease;
  box-shadow: 0 0 10px rgba(0, 200, 255, 0.3);
}

..disease-list li:hover {
  background: linear-gradient(135deg, #009dff, #00ffe7);
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 0 40px rgba(0, 180, 255, 1), 0 0 70px rgba(0, 255, 200, 1);
}

.disease-list li:hover {
  background: linear-gradient(135deg, #667eea, #764ba2);
  transform: translateY(-3px);
  box-shadow: 0 0 22px rgba(102, 126, 234, 0.7);
}

input[type="file"] {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 2px dashed rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.05);
  color: white;
  cursor: pointer;
  transition: 0.3s ease;
  margin-bottom: 20px;
  box-shadow: 0 0 10px rgba(0, 200, 255, 0.25);
}

input[type="file"]:hover {
  border-color: #00d4ff;
  box-shadow: 0 0 45px rgba(0, 200, 255, 1), 0 0 70px rgba(0, 255, 200, 0.9);
}

input[type="file"]:hover {
  border-color: #667eea;
  box-shadow: 0 0 15px rgba(102, 126, 234, 0.7);
}

input[type="submit"] {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  background: linear-gradient(135deg, #00b7ff, #00ffa1);
  border: none;
  border-radius: 30px;
  color: white;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s ease;
  box-shadow: 0 0 15px rgba(0, 200, 255, 0.5);
}

input[type="submit"]:hover {
  transform: scale(1.07);
  background: linear-gradient(135deg, #00c8ff, #00ffe0);
  box-shadow: 0 0 50px rgba(0, 200, 255, 1), 0 0 90px rgba(0,255,220,1);
}

input[type="submit"]:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 35px rgba(118, 75, 162, 0.9);
}



/* ===== SUPER NEON GLOW UPGRADE ===== */

/* Global neon glow pulse */
@keyframes neonPulse {
  0% { box-shadow: 0 0 15px rgba(102,126,234,0.6), 0 0 30px rgba(118,75,162,0.4); }
  50% { box-shadow: 0 0 35px rgba(102,126,234,1), 0 0 65px rgba(118,75,162,0.9); }
  100% { box-shadow: 0 0 15px rgba(102,126,234,0.6), 0 0 30px rgba(118,75,162,0.4); }
}

/* Container bigger glow */
.upload-container {
  
  border: 1px solid rgba(118,75,162,0.8) !important;
}

/* Disease list neon halo */
.disease-list li {
  box-shadow: 0 0 20px rgba(102,126,234,0.9), 0 0 40px rgba(118,75,162,0.7) !important;
}

.disease-list li:hover {
  transform: scale(1.09);
  box-shadow: 0 0 40px rgba(102,126,234,1), 0 0 80px rgba(118,75,162,1) !important;
}

/* File input stronger glow */
input[type=\"file\"] {
  box-shadow: 0 0 25px rgba(118,75,162,0.6), 0 0 50px rgba(102,126,234,0.4) !important;
}

input[type=\"file\"]:hover {
  box-shadow: 0 0 45px rgba(118,75,162,1), 0 0 90px rgba(102,126,234,1) !important;
}

/* Submit button super neon */
input[type=\"submit\"] {
  box-shadow: 0 0 30px rgba(102,126,234,1), 0 0 70px rgba(118,75,162,0.9) !important;
}

input[type=\"submit\"]:hover {
  transform: scale(1.08);
  box-shadow: 0 0 60px rgba(102,126,234,1), 0 0 120px rgba(118,75,162,1) !important;
}

/* Glowing animated background */
@keyframes neonBackground {
  0% { background-position: 0% 0%; }
  50% { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}

body {
  background: linear-gradient(135deg, #0f0f0f, #1a1a2e, #3d2b5f);
  background-size: 300% 300%;
  
}

</style>
</head>
<body>

<div class="upload-container">
  <h1>SKIN AI</h1>
  <h2>Upload an image to predict skin disease</h2>

  <ul class="disease-list">
    <li>Acne</li>
    <li>Hairloss</li>
    <li>Nail </li>
    <li>Normal</li>
    <li>Skin Allergy</li>
  </ul>

  <form action="/" method="post" enctype="multipart/form-data">
    <input type="file" name="file" required />
    <input type="submit" value="Upload & Predict" />
  </form>
</div>

</body>
</html>
